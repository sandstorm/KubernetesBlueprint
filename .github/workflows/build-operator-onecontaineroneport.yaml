name: Build operator-onecontaineroneport

on:
  push:
    branches: [main]
    paths:
      - "operator-onecontaineroneport/**"

env:
  IMAGE: ghcr.io/sandstorm/kubernetesblueprint/operator-onecontaineroneport

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: operator-onecontaineroneport
          push: true
          tags: ${{ env.IMAGE }}:latest
