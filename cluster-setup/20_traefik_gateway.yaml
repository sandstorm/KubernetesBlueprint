# Customize k3s's built-in Traefik to run as a DaemonSet with Gateway API support.
#
# k3s v1.33.x ships Traefik v3.6.x as a HelmChart. HelmChartConfig patches its
# values without replacing it — no need to disable or redeploy.
#
# Traffic path: Hetzner LB → node private IP → hostPort → Traefik (DaemonSet)
# Each node binds ports 80/443 directly via hostPort, so the LB can reach
# Traefik on any node without a separate LoadBalancer service.
#
# CILIUM UPGRADE PATH:
# Switch to service.type=ClusterIP (remove hostPort) + CiliumLocalRedirectPolicy
# per node IP. See README for instructions.
#
# PROXY PROTOCOL (optional — requires enabling on the Hetzner LB too):
# Uncomment proxyProtocol.trustedIPs in the ports section below.
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    service:
      type: ClusterIP

    deployment:
      # Run on every node so the Hetzner LB can reach Traefik via any node
      kind: DaemonSet

    providers:
      kubernetesGateway:
        enabled: true
      kubernetesIngress:
        enabled: false

    # Disable the auto-deployed default Gateway — we create Gateways per app
    gateway:
      enabled: false

    logs:
      general:
        level: INFO
      access:
        enabled: true

    ports:
      web:
        port: 80
        hostPort: 80
        # proxyProtocol:
        #   trustedIPs:
        #     - "10.208.183.0/24"   # Hetzner private network (LB IP range)
      websecure:
        port: 443
        hostPort: 443
        # proxyProtocol:
        #   trustedIPs:
        #     - "10.208.183.0/24"
      traefik:
        port: 9000
        expose:
          default: false

    ingressRoute:
      dashboard:
        # Only accessible via the 'traefik' entrypoint (not exposed to the internet)
        enabled: true
