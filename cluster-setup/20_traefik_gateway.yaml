# Customize k3s's built-in Traefik to run as a DaemonSet with Gateway API support.
#
# k3s v1.33.x ships Traefik v3.6.x as a HelmChart. HelmChartConfig patches its
# values without replacing it — no need to disable or redeploy.
#
# Traffic path: Hetzner LB → node private IP → CiliumLocalRedirectPolicy → Traefik pod (local node)
# Traefik runs as a ClusterIP DaemonSet (no hostPort). Cilium intercepts traffic arriving at each
# node's IP on port 80/443 via eBPF and redirects it to the local Traefik pod — preserving the
# original client IP. CiliumLocalRedirectPolicy resources are applied by cluster-setup:apply.
#
# PROXY PROTOCOL (optional — requires enabling on the Hetzner LB too):
# Uncomment proxyProtocol.trustedIPs in the ports section below.
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    service:
      type: ClusterIP

    deployment:
      # Run on every node so the Hetzner LB can reach Traefik via any node
      kind: DaemonSet

    providers:
      kubernetesGateway:
        enabled: true
      kubernetesIngress:
        enabled: false

    # Disable the auto-deployed default Gateway — we create Gateways per app
    gateway:
      enabled: false

    logs:
      general:
        level: INFO
      access:
        enabled: true

    ports:
      # No hostPort here — CiliumLocalRedirectPolicy handles routing from the node's IP to Traefik.
      # Applied per-node by cluster-setup:apply. See README for details.
      web:
        port: 80
        proxyProtocol:
          trustedIPs:
            - "10.208.183.0/24"   # Hetzner private network (LB IP range)
      websecure:
        port: 443
        proxyProtocol:
          trustedIPs:
            - "10.208.183.0/24"
      traefik:
        port: 9000
        expose:
          default: false

    ingressRoute:
      dashboard:
        # Only accessible via the 'traefik' entrypoint (not exposed to the internet)
        enabled: true
