# Applied AFTER cert-manager is fully running (CRDs must exist first).
# See .mise/tasks/cluster-setup/apply for the wait logic.

---
# This Gateway listens on port 80 and accepts ACME http01 challenge routes
# from all namespaces. cert-manager creates temporary HTTPRoutes under it
# to answer Let's Encrypt challenges.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: acme-http01-gateway
  namespace: cert-manager
spec:
  # k3s's built-in Traefik GatewayClass
  gatewayClassName: traefik
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All

---
# Production Let's Encrypt issuer — use this for real domains.
# Rate limits apply: max 5 failed validations per hour, max 50 certs/domain/week.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: ${CERT_MANAGER_EMAIL}
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    server: https://acme-v02.api.letsencrypt.org/directory
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: acme-http01-gateway
                namespace: cert-manager
                kind: Gateway

---
# Staging Let's Encrypt issuer — use this for testing first (no rate limits,
# but certificates are NOT trusted by browsers).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    email: ${CERT_MANAGER_EMAIL}
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: acme-http01-gateway
                namespace: cert-manager
                kind: Gateway
