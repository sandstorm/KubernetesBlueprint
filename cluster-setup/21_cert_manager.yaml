apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager

---
# cert-manager — automatic TLS certificate management via Let's Encrypt.
# Uses the Gateway API http01 solver: cert-manager creates temporary HTTPRoutes
# under the acme-http01-gateway to answer ACME challenges.
#
# The email address is substituted from $CERT_MANAGER_EMAIL at apply time
# (see .mise/tasks/cluster-setup/apply).
#
# USAGE: Annotate your Gateway resource:
#   cert-manager.io/cluster-issuer: letsencrypt-prod
# cert-manager will then create and renew the TLS certificate automatically.
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: cert-manager
  namespace: cert-manager
# https://github.com/k3s-io/helm-controller/blob/master/doc/helmchart.md#HelmChart
spec:
  repo: https://charts.jetstack.io
  chart: cert-manager
  targetNamespace: cert-manager
  # https://artifacthub.io/packages/helm/cert-manager/cert-manager
  version: '1.19.2'
  set:
    "crds.enabled": "true"
    "crds.keep": "true"
    # Enable Gateway API support for http01 solvers
    "extraArgs[0]": "--enable-gateway-api"

