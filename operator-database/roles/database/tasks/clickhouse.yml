# The following variables are set:
#
# - host
# - adminUser
# - adminPassword
# - databaseUser
# - databasePassword
# - databaseName

- name: Create a new database with name '{{ databaseName }}'
  # NOTE: we can connect to clickhouse via the MYSQL interface: https://clickhouse.com/docs/en/interfaces/mysql/
  community.mysql.mysql_query:
    login_db: default
    query: |
        CREATE DATABASE IF NOT EXISTS "{{ databaseName }}"

    login_host: '{{ host }}'
    login_user: '{{ adminUser }}'
    login_password: '{{ adminPassword }}'
    # use the mysql wire protocol, because there is no ansible module for clickhouse.
    login_port: 9004


- name: Create database user {{ databaseUser }}
  community.mysql.mysql_query:
    login_db: default
    query: |
        CREATE USER OR REPLACE "{{ databaseUser }}" IDENTIFIED BY '{{ databasePassword }}'

    login_host: '{{ host }}'
    login_user: '{{ adminUser }}'
    login_password: '{{ adminPassword }}'
    # use the mysql wire protocol, because there is no ansible module for clickhouse.
    login_port: 9004

- name: Create permissions for the single database
  community.mysql.mysql_query:
    login_db: default
    query: |
        GRANT ALL ON "{{ databaseName }}".* TO "{{ databaseUser }}"

    login_host: '{{ host }}'
    login_user: '{{ adminUser }}'
    login_password: '{{ adminPassword }}'
    # use the mysql wire protocol, because there is no ansible module for clickhouse.
    login_port: 9004

- name: Create permissions for creating functions (functions are *global* in ClickHouse)
  community.mysql.mysql_query:
    login_db: default
    query: |
        GRANT CREATE FUNCTION ON *.* TO "{{ databaseUser }}"

    login_host: '{{ host }}'
    login_user: '{{ adminUser }}'
    login_password: '{{ adminPassword }}'
    # use the mysql wire protocol, because there is no ansible module for clickhouse.
    login_port: 9004
