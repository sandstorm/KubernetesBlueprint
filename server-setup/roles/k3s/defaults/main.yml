---
# =============================================================================
# K3s Role — Default Variables
# =============================================================================

# ---------------------
# REQUIRED (no defaults — playbook will fail if not set)
# ---------------------

# K3s release version. Find versions at: https://github.com/k3s-io/k3s/releases
# Example: "v1.33.6+k3s1"
# k3s_version:

# Shared secret token for the cluster. Generate with: openssl rand -hex 32
# For production, use Ansible Vault: k3s_token: "{{ vault_k3s_token }}"
# k3s_token:

# ---------------------
# K3s Core
# ---------------------

# K3s mode: "server" (control plane + worker) or "agent" (worker only)
k3s_mode: "server"

# Private IP of this node on the internal/private network.
# When set, Ansible auto-detects the corresponding NIC and injects into the k3s service:
#   --node-ip  : always — controls which IP K3s advertises for inter-node traffic and
#                embedded etcd peer communication
#   --flannel-iface : only when Flannel is active (i.e. --flannel-backend=none is NOT set)
#                     — forces Flannel VXLAN to use the private network interface
# Set this per-host in inventory when nodes have a dedicated private network.
# k3s_private_ip:

# Additional K3s CLI arguments. This is the main knob for cluster configuration.
# Default enables embedded etcd for a single-node setup.
# Note: --node-ip and --flannel-iface are injected automatically when k3s_private_ip is set.
#
# Common patterns:
#   Single node:           "--cluster-init"
#   Disable built-in ingress: "--cluster-init --disable=traefik"
#   Multi-node first node: "--cluster-init --tls-san <PUBLIC_IP>"
#   Multi-node join node:  "--server https://<FIRST_NODE_PRIVATE_IP>:6443 --tls-san <PUBLIC_IP>"
#   With Cilium CNI:       "--cluster-init --disable=traefik --disable-network-policy --flannel-backend=none"
#   High pod density:      add "--kubelet-arg=max-pods=250"
k3s_extra_args: "--cluster-init"

# ---------------------
# etcdctl (optional)
# ---------------------

# Install etcdctl for debugging the embedded etcd database
k3s_install_etcdctl: true

etcdctl_version: "v3.5.0"
# SHA256 checksum from https://github.com/etcd-io/etcd/releases
etcdctl_zip_checksum: "864baa0437f8368e0713d44b83afe21dce1fb4ee7dae4ca0f9dd5f0df22d01c4"

# ---------------------
# Private Docker Registry (optional)
# ---------------------

# Uncomment to configure a private registry for K3s to pull images from.
# k3s_private_registry_host: "registry.example.com"
# k3s_private_registry_username: "user"
# k3s_private_registry_password: "password"

# ---------------------
# System
# ---------------------

systemd_dir: "/etc/systemd/system"
