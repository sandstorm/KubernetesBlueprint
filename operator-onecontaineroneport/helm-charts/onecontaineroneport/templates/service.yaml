{{- if (not .Values.stopped) }}
apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-service
  labels:
    app: {{ .Release.Name }}
spec:
  selector:
    app: {{ .Release.Name }}
    component: app
  ports:
    - name: http
      port: 80
      targetPort: "p-{{ .Values.port }}"
{{- end }}
