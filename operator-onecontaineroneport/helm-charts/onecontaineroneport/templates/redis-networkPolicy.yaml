{{- if .Values.redis }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}-redis
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}-redis
  policyTypes:
  - Ingress
  ingress:
  - from:
    # Allow incoming access from the application itself
    - podSelector:
        matchLabels:
          app: {{ .Release.Name }}
          component: app
    # Allow incoming access from ourselves
    - podSelector:
        matchLabels:
          app: {{ .Release.Name }}-redis
{{- end }}
