apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}
      component: app
  policyTypes:
  - Ingress
  ingress:
  - from:
    # Allow incoming access from traefik gateway
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          app.kubernetes.io/name: traefik

    # Allow incoming access from ourselves
    - podSelector:
        matchLabels:
          app: {{ .Release.Name }}
          component: app
